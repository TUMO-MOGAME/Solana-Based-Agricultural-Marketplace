<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mazra'at albaan — Seeds, credit, insurance, repaid at harvest">
  <title>Mazra'at albaan</title>
  <defs>
    <linearGradient id="sproutGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8B931"/>
      <stop offset="100%" stop-color="#FAEBC3"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="58%" r="55%">
      <stop offset="0%" stop-color="#E8B931" stop-opacity="0.28"/>
      <stop offset="55%" stop-color="#E8B931" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#E8B931" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8B931"/>
      <stop offset="100%" stop-color="#FAEBC3"/>
    </linearGradient>
  </defs>

  <!-- Forest-green panel -->
  <rect width="1200" height="400" fill="#0B3D2E"/>

  <!-- Mark, scaled into a 300x300 box at (50,50) -->
  <g transform="translate(50 50) scale(0.586)">
    <circle cx="256" cy="256" r="252" fill="#0B3D2E"/>
    <circle cx="256" cy="256" r="252" fill="url(#bgGlow)"/>
    <circle cx="256" cy="256" r="244" fill="none"
            stroke="#E8B931" stroke-opacity="0.45" stroke-width="2"/>
    <path d="M256 400 L256 195"
          stroke="url(#sproutGrad)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M256 268 C 265 198, 303 152, 370 130 C 361 200, 323 246, 256 268 Z"
          fill="url(#sproutGrad)"/>
    <path d="M256 268 C 247 198, 209 152, 142 130 C 151 200, 189 246, 256 268 Z"
          fill="url(#sproutGrad)"/>
    <path d="M164 410 Q256 425 348 410"
          stroke="#E8B931" stroke-opacity="0.55"
          stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="395" y="195"
        font-family="Satoshi, Inter, 'Segoe UI', system-ui, sans-serif"
        font-weight="700"
        font-size="96"
        fill="#F5F2EA"
        letter-spacing="-1.5">Mazra'at albaan</text>

  <!-- Subtitle / tagline -->
  <text x="397" y="245"
        font-family="Satoshi, Inter, 'Segoe UI', system-ui, sans-serif"
        font-weight="500"
        font-size="22"
        fill="url(#subGrad)"
        letter-spacing="3.2">SEEDS · CREDIT · INSURANCE — REPAID AT HARVEST</text>
</svg>
